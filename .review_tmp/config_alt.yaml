validation:
  device_id_pattern: "^DEV-[A-Z0-9]{3,10}$"
  time_formats:
    - '%d/%m/%Y %H:%M'
  valid_issue_types:
    - temperature
    - pressure
    - vibration
    - voltage
    - current
    - connectivity
    - performance
    - security
    - other
  valid_severities:
    - critical
    - warning
    - info

event_merge:
  time_window_minutes: 30
  same_device_only: true
  same_issue_type: true

export:
  csv_field_order:
    - event_id
    - status
    - device_id
    - first_seen
    - last_seen
    - severity
    - issue_type
    - record_count
    - handler
    - note
    - version
    - source_record_ids

batch:
  preview_fields:
    - event_id
    - status
    - device_id
    - first_seen
    - last_seen
    - severity
    - issue_type
    - handler
    - note
  conflict_strategy: "skip"
  log_retention_days: 30

db_path: '.review_tmp/review.db'
