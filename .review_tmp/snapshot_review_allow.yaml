validation:
  device_id_pattern: '^DEV-[A-Z0-9]{3,10}$'
  time_formats:
    - '%Y-%m-%d %H:%M:%S'
    - '%Y-%m-%dT%H:%M:%S'
    - '%Y/%m/%d %H:%M:%S'
  valid_issue_types:
    - temperature
    - pressure
    - vibration
    - voltage
    - current
    - connectivity
    - performance
    - security
    - other
  valid_severities:
    - critical
    - warning
    - info

event_merge:
  time_window_minutes: 30
  same_device_only: true
  same_issue_type: true

export:
  csv_field_order:
    - event_id
    - status
    - device_id
    - first_seen
    - last_seen
    - severity
    - issue_type
    - record_count
    - handler
    - note
    - version
    - source_record_ids

batch:
  preview_fields:
    - event_id
    - status
    - device_id
    - first_seen
    - last_seen
    - severity
    - issue_type
    - handler
    - note
  conflict_strategy: skip
  log_retention_days: 30

duty:
  available_teams:
    - Alpha
    - Beta
  max_escalation_levels: 3
  handover_allowed_roles:
    - leader
    - manager
  default_rollback_window_hours: 24
  log_retention_days: 90
  valid_roles:
    - leader
    - engineer
    - operator
    - manager
  valid_shifts:
    - morning
    - afternoon
    - night
    - day
    - custom

snapshot:
  exportable_teams:
    - Alpha
    - Beta
  allow_rollback: true
  max_retention_per_team: 100
  require_team_for_generation: true
  allow_generate_after_handover: true
  log_retention_days: 180
  allowed_export_roles:
    - leader
    - manager
  allowed_generate_roles:
    - leader
    - manager
    - engineer
  allowed_import_roles:
    - manager

db_path: 'D:/workSpace/AI__SPACE/lfc-00022/.review_tmp/snapshot_review.db'
